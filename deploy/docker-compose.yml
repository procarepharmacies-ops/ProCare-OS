version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: procare-backend
    ports:
      - "7000:8000"
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:ProCareAdmin%23Strong2024@localhost:1433/procare_db?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
      - ESTOCK_HOST=196.202.93.37
      - ESTOCK_PORT=1433
      - ESTOCK_DB=stock
      - ESTOCK_USER=procare_reader
      - ESTOCK_PASS=ProCareReadOnly#2024
      - PROCARE_HOST=localhost
      - PROCARE_PORT=1433
      - PROCARE_DB=procare_db
      - PROCARE_USER=sa
      - PROCARE_PASS=ProCareAdmin#Strong2024
      - SYNC_ENABLED=true
      - SYNC_INTERVAL_SECONDS=300
      - DEFAULT_LANGUAGE=ar
      - DEFAULT_THEME=light
      - AI_MODEL=claude-3-5-sonnet-20241022
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: procare-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://196.202.93.36:7000
      - NODE_ENV=production
    depends_on:
      - backend
    network_mode: host
